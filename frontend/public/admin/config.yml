backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "school"
    label: "School Content"
    folder: "content"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Principal Message", name: "message", widget: "text" }
      - { label: "Upload Image", name: "image", widget: "image" }
